<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 118" fill="none" aria-hidden="true">
  <defs>
    <filter id="tj-cyan-glow-full" x="-45%" y="-45%" width="190%" height="190%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.2" result="b"/>
      <feFlood flood-color="#22d3ee" flood-opacity="0.95" result="f"/>
      <feComposite in="f" in2="b" operator="in" result="g"/>
      <feGaussianBlur in="g" stdDeviation="1.2" result="g2"/>
      <feMerge>
        <feMergeNode in="g2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Same geometry as tj-icon.svg; centered in wider canvas. Glow on path only — “FIT” stays sharp. -->
  <g transform="translate(14, 0)">
    <path
      filter="url(#tj-cyan-glow-full)"
      fill="#ffffff"
      d="M18 8h64v7H56v27h22L50 90 22 42h22V15H18V8z"
    />
  </g>
  <text
    x="64"
    y="112"
    text-anchor="middle"
    fill="#ffffff"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="16"
    font-weight="800"
    letter-spacing="0.28em"
  >FIT</text>
</svg>
