<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 92" fill="none" aria-hidden="true">
  <defs>
    <filter id="tj-cyan-glow" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.2" result="b"/>
      <feFlood flood-color="#22d3ee" flood-opacity="0.95" result="f"/>
      <feComposite in="f" in2="b" operator="in" result="g"/>
      <feGaussianBlur in="g" stdDeviation="1.2" result="g2"/>
      <feMerge>
        <feMergeNode in="g2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Legible “TJ”: T bar + stem, J bar + stem + bottom hook (no single downward dart) -->
  <g transform="translate(24,12)" filter="url(#tj-cyan-glow)" fill="#ffffff">
    <path d="M0 0h26v8H17.75V68H8.25V8H0V0z"/>
    <path d="M30 0H52V8H43V58H28V68H52v-60H30V0z"/>
  </g>
</svg>
